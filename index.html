<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>npm Trends — Download Comparison</title>
<meta name="description" content="Compare npm package download trends side-by-side. Visualize daily downloads over time with interactive charts.">
<meta property="og:title" content="npm Trends — Download Comparison">
<meta property="og:description" content="Compare npm package download trends side-by-side. Visualize daily downloads over time with interactive charts.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://yurukusa.github.io/npm-trends/">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<link rel="canonical" href="https://yurukusa.github.io/npm-trends/">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--text-dim:#8b949e;--accent:#58a6ff;--radius:8px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
header{text-align:center;padding:2rem 1rem 1rem}
header h1{font-size:1.8rem;font-weight:700;margin-bottom:.3rem}
header p{color:var(--text-dim);font-size:.95rem}
main{max-width:1100px;width:100%;margin:0 auto;padding:0 1rem 2rem;flex:1}
.controls{display:flex;gap:.5rem;flex-wrap:wrap;margin:1.5rem 0}
.controls input{flex:1;min-width:200px;padding:.6rem .8rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:.95rem;outline:none}
.controls input:focus{border-color:var(--accent)}
.controls button{padding:.6rem 1.2rem;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-size:.95rem;font-weight:600;white-space:nowrap}
.controls button:hover{opacity:.85}
.period-bar{display:flex;gap:.4rem;margin-bottom:.5rem}
.period-bar button{padding:.35rem .8rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-dim);cursor:pointer;font-size:.85rem}
.period-bar button.active{border-color:var(--accent);color:var(--accent)}
.presets{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.2rem}
.presets button{padding:.3rem .7rem;background:transparent;border:1px solid var(--border);border-radius:var(--radius);color:var(--text-dim);cursor:pointer;font-size:.8rem}
.presets button:hover{border-color:var(--accent);color:var(--accent)}
.chart-wrap{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:1.5rem}
canvas{width:100%;height:400px;display:block}
.tooltip{position:absolute;pointer-events:none;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:.5rem .7rem;font-size:.82rem;line-height:1.5;display:none;z-index:10;white-space:nowrap}
.legend{display:flex;gap:1rem;flex-wrap:wrap;margin-top:.8rem;justify-content:center}
.legend-item{display:flex;align-items:center;gap:.3rem;font-size:.85rem}
.legend-dot{width:10px;height:10px;border-radius:50%}
.summary-table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;font-size:.9rem}
.summary-table th,.summary-table td{padding:.6rem .8rem;text-align:left;border-bottom:1px solid var(--border)}
.summary-table th{color:var(--text-dim);font-weight:600;font-size:.8rem;text-transform:uppercase;letter-spacing:.03em}
.summary-table td:first-child{font-weight:600}
.trend-up{color:#3fb950}.trend-down{color:#f85149}
.loading{text-align:center;color:var(--text-dim);padding:2rem;font-size:.95rem}
.error{text-align:center;color:#f85149;padding:1rem;font-size:.9rem}
footer{text-align:center;padding:1.5rem 1rem;color:var(--text-dim);font-size:.82rem;border-top:1px solid var(--border)}
@media(max-width:600px){canvas{height:280px}.controls{flex-direction:column}.controls input{min-width:0}}
</style>
</head>
<body>
<header>
<h1>npm Trends</h1>
<p>Compare npm package download trends side-by-side</p>
</header>
<main>
<div class="controls">
<input type="text" id="pkgInput" placeholder="Enter package names, comma-separated (e.g. react,vue,svelte)" autocomplete="off">
<button id="compareBtn">Compare</button>
</div>
<div class="presets">
<button data-pkgs="react,vue,svelte,angular">Frameworks</button>
<button data-pkgs="express,fastify,koa,hono">Servers</button>
<button data-pkgs="jest,vitest,mocha">Testing</button>
<button data-pkgs="webpack,vite,esbuild,rollup">Bundlers</button>
</div>
<div class="period-bar">
<button data-period="last-week">Week</button>
<button data-period="last-month">Month</button>
<button data-period="last-year" class="active">Year</button>
</div>
<div id="status"></div>
<div class="chart-wrap" id="chartWrap" style="display:none">
<canvas id="chart"></canvas>
<div class="tooltip" id="tooltip"></div>
<div class="legend" id="legend"></div>
</div>
<div id="tableWrap"></div>
</main>
<footer>
Data from <a href="https://www.npmjs.com/" target="_blank" rel="noopener">npm registry</a> | Part of <a href="https://yurukusa.github.io/dev-toolkit/" target="_blank" rel="noopener">Dev Toolkit</a>
</footer>
<script>
// --- Color palette for up to 5 packages ---
const COLORS = ['#58a6ff','#3fb950','#d2a8ff','#f0883e','#f778ba'];

// --- State ---
let pkgData = {}; // { name: [{day,downloads},...] }
let currentPeriod = 'last-year';
let chartPoints = []; // for hover: [{x,y,pkg,day,downloads}]

const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');
const tooltipEl = document.getElementById('tooltip');
const chartWrap = document.getElementById('chartWrap');
const legendEl = document.getElementById('legend');
const statusEl = document.getElementById('status');
const tableWrap = document.getElementById('tableWrap');
const pkgInput = document.getElementById('pkgInput');

// --- URL param support ---
function init() {
  const params = new URLSearchParams(location.search);
  const pkgs = params.get('pkgs');
  if (pkgs) {
    pkgInput.value = pkgs;
    runComparison();
  }
}

// --- Period range helper ---
function periodRange(period) {
  const end = new Date();
  const start = new Date();
  if (period === 'last-week') start.setDate(end.getDate() - 7);
  else if (period === 'last-month') start.setDate(end.getDate() - 30);
  else start.setFullYear(end.getFullYear() - 1);
  return { start: fmt(start), end: fmt(end) };
}
function fmt(d) {
  return d.toISOString().slice(0, 10);
}

// --- Fetch downloads ---
async function fetchDownloads(pkg, period) {
  const { start, end } = periodRange(period);
  const url = `https://api.npmjs.org/downloads/range/${start}:${end}/${encodeURIComponent(pkg)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Package "${pkg}" not found`);
  const json = await res.json();
  return json.downloads; // [{day, downloads}]
}

// --- Main compare ---
async function runComparison() {
  const raw = pkgInput.value.trim();
  if (!raw) return;
  const names = [...new Set(raw.split(',').map(s => s.trim().toLowerCase()).filter(Boolean))].slice(0, 5);
  if (!names.length) return;

  // Update URL
  const url = new URL(location);
  url.searchParams.set('pkgs', names.join(','));
  history.replaceState(null, '', url);

  statusEl.innerHTML = '<div class="loading">Fetching download data...</div>';
  chartWrap.style.display = 'none';
  tableWrap.innerHTML = '';
  pkgData = {};

  const errors = [];
  await Promise.all(names.map(async (name) => {
    try {
      pkgData[name] = await fetchDownloads(name, currentPeriod);
    } catch (e) {
      errors.push(e.message);
    }
  }));

  if (errors.length) {
    statusEl.innerHTML = `<div class="error">${errors.join('<br>')}</div>`;
    if (!Object.keys(pkgData).length) return;
  } else {
    statusEl.innerHTML = '';
  }

  chartWrap.style.display = 'block';
  drawChart();
  drawTable();
}

// --- Canvas chart ---
function drawChart() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width;
  const H = rect.height;

  // Margins
  const ml = 65, mr = 20, mt = 20, mb = 40;
  const cw = W - ml - mr;
  const ch = H - mt - mb;

  ctx.clearRect(0, 0, W, H);

  const pkgNames = Object.keys(pkgData);
  if (!pkgNames.length) return;

  // Determine global max and date range
  let globalMax = 0;
  let maxLen = 0;
  for (const name of pkgNames) {
    const dl = pkgData[name];
    if (dl.length > maxLen) maxLen = dl.length;
    for (const d of dl) {
      if (d.downloads > globalMax) globalMax = d.downloads;
    }
  }
  if (globalMax === 0) globalMax = 1;

  // Nice round max
  const niceMax = niceNum(globalMax);

  // Grid lines
  const gridLines = 5;
  ctx.strokeStyle = '#21262d';
  ctx.lineWidth = 1;
  ctx.fillStyle = '#8b949e';
  ctx.font = '11px -apple-system, sans-serif';
  ctx.textAlign = 'right';
  for (let i = 0; i <= gridLines; i++) {
    const y = mt + ch - (i / gridLines) * ch;
    const val = (i / gridLines) * niceMax;
    ctx.beginPath();
    ctx.moveTo(ml, y);
    ctx.lineTo(ml + cw, y);
    ctx.stroke();
    ctx.fillText(formatNum(val), ml - 8, y + 4);
  }

  // X axis labels
  const dates = pkgData[pkgNames[0]];
  ctx.textAlign = 'center';
  const labelCount = Math.min(6, dates.length);
  for (let i = 0; i < labelCount; i++) {
    const idx = Math.round(i * (dates.length - 1) / (labelCount - 1));
    const x = ml + (idx / (maxLen - 1)) * cw;
    const d = dates[idx];
    if (d) {
      ctx.fillText(shortDate(d.day), x, H - mb + 18);
    }
  }

  // Draw lines
  chartPoints = [];
  pkgNames.forEach((name, pi) => {
    const dl = pkgData[name];
    const color = COLORS[pi % COLORS.length];
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < dl.length; i++) {
      const x = ml + (i / (maxLen - 1)) * cw;
      const y = mt + ch - (dl[i].downloads / niceMax) * ch;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      chartPoints.push({ x, y, pkg: name, day: dl[i].day, downloads: dl[i].downloads, color });
    }
    ctx.stroke();
  });

  // Legend
  legendEl.innerHTML = pkgNames.map((name, i) =>
    `<div class="legend-item"><div class="legend-dot" style="background:${COLORS[i % COLORS.length]}"></div>${name}</div>`
  ).join('');
}

function niceNum(val) {
  const mag = Math.pow(10, Math.floor(Math.log10(val)));
  const frac = val / mag;
  let nice;
  if (frac <= 1) nice = 1;
  else if (frac <= 2) nice = 2;
  else if (frac <= 5) nice = 5;
  else nice = 10;
  return nice * mag;
}

function formatNum(n) {
  if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return Math.round(n).toString();
}

function shortDate(s) {
  const [y, m, d] = s.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[+m - 1]} ${+d}`;
}

// --- Tooltip on hover ---
canvas.addEventListener('mousemove', (e) => {
  if (!chartPoints.length) { tooltipEl.style.display = 'none'; return; }
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  // Find nearest x position (snap to date column)
  let nearestDist = Infinity;
  let nearestX = 0;
  for (const p of chartPoints) {
    const dx = Math.abs(p.x - mx);
    if (dx < nearestDist) { nearestDist = dx; nearestX = p.x; }
  }
  if (nearestDist > 30) { tooltipEl.style.display = 'none'; return; }

  // Get all points at this x
  const atX = chartPoints.filter(p => Math.abs(p.x - nearestX) < 1);
  if (!atX.length) { tooltipEl.style.display = 'none'; return; }

  let html = `<div style="font-weight:600;margin-bottom:3px">${atX[0].day}</div>`;
  for (const p of atX) {
    html += `<div><span style="color:${p.color}">\u25CF</span> ${p.pkg}: ${p.downloads.toLocaleString()}</div>`;
  }
  tooltipEl.innerHTML = html;
  tooltipEl.style.display = 'block';

  // Position tooltip
  const tw = tooltipEl.offsetWidth;
  let tx = nearestX + 15;
  if (tx + tw > rect.width - 10) tx = nearestX - tw - 15;
  let ty = my - 10;
  if (ty < 5) ty = 5;
  tooltipEl.style.left = tx + 'px';
  tooltipEl.style.top = ty + 'px';
});

canvas.addEventListener('mouseleave', () => { tooltipEl.style.display = 'none'; });

// --- Summary table ---
function drawTable() {
  const pkgNames = Object.keys(pkgData);
  if (!pkgNames.length) { tableWrap.innerHTML = ''; return; }

  let rows = '';
  pkgNames.forEach((name, i) => {
    const dl = pkgData[name];
    const total = dl.reduce((s, d) => s + d.downloads, 0);
    const avg = Math.round(total / dl.length);
    const peak = dl.reduce((mx, d) => d.downloads > mx.downloads ? d : mx, dl[0]);

    // Trend: compare first half avg to second half avg
    const mid = Math.floor(dl.length / 2);
    const firstHalf = dl.slice(0, mid);
    const secondHalf = dl.slice(mid);
    const firstAvg = firstHalf.reduce((s, d) => s + d.downloads, 0) / firstHalf.length;
    const secondAvg = secondHalf.reduce((s, d) => s + d.downloads, 0) / secondHalf.length;
    const trendPct = firstAvg ? ((secondAvg - firstAvg) / firstAvg * 100).toFixed(1) : 0;
    const trendClass = trendPct >= 0 ? 'trend-up' : 'trend-down';
    const trendArrow = trendPct >= 0 ? '\u2191' : '\u2193';

    rows += `<tr>
      <td><span style="color:${COLORS[i % COLORS.length]}">\u25CF</span> ${name}</td>
      <td>${total.toLocaleString()}</td>
      <td>${avg.toLocaleString()}</td>
      <td>${peak.downloads.toLocaleString()} <span style="color:var(--text-dim);font-size:.8rem">(${shortDate(peak.day)})</span></td>
      <td class="${trendClass}">${trendArrow} ${Math.abs(trendPct)}%</td>
    </tr>`;
  });

  tableWrap.innerHTML = `<table class="summary-table">
    <thead><tr><th>Package</th><th>Total</th><th>Daily Avg</th><th>Peak Day</th><th>Trend</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// --- Event listeners ---
document.getElementById('compareBtn').addEventListener('click', runComparison);
pkgInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') runComparison(); });

document.querySelectorAll('.presets button').forEach(btn => {
  btn.addEventListener('click', () => {
    pkgInput.value = btn.dataset.pkgs;
    runComparison();
  });
});

document.querySelectorAll('.period-bar button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.period-bar button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentPeriod = btn.dataset.period;
    if (pkgInput.value.trim()) runComparison();
  });
});

// Responsive redraw
window.addEventListener('resize', () => { if (Object.keys(pkgData).length) drawChart(); });

init();
</script>
</body>
</html>
